<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vibe Pantry{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1e;
            color: #d8d8d8;
            max-width: 920px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
            line-height: 1.5;
        }
        nav {
            display: flex;
            gap: 0.25rem;
            padding: 1.25rem 0;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2e2e34;
        }
        nav a {
            color: #a0a0a8;
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        nav a:hover { color: #e8e8e8; background: #28282e; }
        h1 { color: #f0f0f0; margin-bottom: 0.75rem; font-weight: 600; font-size: 1.6rem; }
        h2 { color: #c0c0c6; margin: 1.75rem 0 0.75rem; font-weight: 500; font-size: 1.15rem; }
        h3 { color: #b0b0b6; margin: 1.25rem 0 0.5rem; font-weight: 500; font-size: 1rem; }
        p { margin: 0.5rem 0; }
        a { color: #8ab4f8; }
        a:hover { color: #aecbfa; }

        /* Forms */
        .form-card {
            background: #222228;
            border: 1px solid #2e2e34;
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1rem 0;
        }
        label {
            display: block;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #909098;
            font-weight: 500;
        }
        input, select, textarea {
            display: block;
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.5rem 0.65rem;
            background: #1a1a1e;
            border: 1px solid #3a3a42;
            border-radius: 5px;
            color: #d8d8d8;
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #5a5a6a;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
        }
        .form-row label { margin-top: 0; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.1rem;
            background: #2e2e38;
            color: #d8d8d8;
            border: 1px solid #3a3a44;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            margin-top: 1rem;
        }
        .btn:hover { background: #3a3a44; border-color: #4a4a54; }
        .btn-sm {
            padding: 0.25rem 0.6rem;
            margin-top: 0;
            font-size: 0.8rem;
        }
        .btn-link {
            background: none;
            border: none;
            color: #8ab4f8;
            padding: 0;
            margin: 0;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-link:hover { color: #aecbfa; }
        .btn-danger { border-color: #5a2e2e; }
        .btn-danger:hover { background: #3a2020; border-color: #6a3a3a; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th, td {
            padding: 0.55rem 0.85rem;
            text-align: left;
            border-bottom: 1px solid #2a2a30;
        }
        th {
            color: #808088;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        tr:hover td { background: #222228; }

        /* Utilities */
        .tag {
            display: inline-block;
            background: #2a2a34;
            color: #a0a0a8;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin: 0.1rem 0.15rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: #222228;
            border: 1px solid #2e2e34;
            border-radius: 8px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .num {
            font-size: 2rem;
            font-weight: 600;
            color: #f0f0f0;
        }
        .stat-card .lbl {
            font-size: 0.8rem;
            color: #808088;
            margin-top: 0.25rem;
        }
        .coverage-bar {
            display: inline-block;
            height: 6px;
            border-radius: 3px;
            background: #2a2a34;
            width: 80px;
            vertical-align: middle;
            margin-left: 0.5rem;
        }
        .coverage-bar .fill {
            display: block;
            height: 100%;
            border-radius: 3px;
            background: #6a9f6a;
        }
        .text-ok { color: #6a9f6a; }
        .text-miss { color: #b06060; }
        .text-muted { color: #666; }
        .inline-form { display: inline; }

        /* Ingredient/step rows in recipe form */
        .ing-row, .step-row { margin-bottom: 0.5rem; }
        .ing-row select, .ing-row input { display: inline-block; width: auto; margin-right: 0.25rem; }
        .ing-row label { display: inline; font-size: 0.85rem; color: #909098; }
        .step-row textarea { width: 100%; }

        /* Checkbox override */
        input[type="checkbox"] { display: inline; width: auto; margin-right: 0.3rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/ingredients">Ingredients</a>
        <a href="/pantry">Pantry</a>
        <a href="/recipes">Recipes</a>
        <a href="/match">Match</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
